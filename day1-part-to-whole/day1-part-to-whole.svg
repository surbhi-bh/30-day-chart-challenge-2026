<svg width="640" height="490" viewBox="0 0 640 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700;800&amp;display=swap');
      text { font-family: 'IBM Plex Sans', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="490" fill="#FAFAF8"/>

  <!-- ── Title ── -->
  <text font-size="18" font-weight="800" fill="#141413" x="10" y="26" text-anchor="start">Too big for my pocket, too wide for my palm</text>

  <!-- ── Subtitle — 4 lines, "screen-to-body ratios" in teal ── -->
  <text font-size="12" font-weight="400" fill="#3D3D3A" x="10" y="44">Beyond budget, phone size matters to me when choosing a phone.</text>
  <text font-size="12" font-weight="400" fill="#3D3D3A" x="10" y="59"> Tracing</text>
  <text font-size="12" font-weight="600" fill="#1D9E75" x="54" y="59">screen-to-body ratio</text>
  <text font-size="12" font-weight="400" fill="#3D3D3A" x="172" y="59"> from my first phone, a pink Nokia 2626 to the current iPhone 15</text>


  <!-- ══════════════════════════════════════════
       LEGEND — top-right, both labels on RIGHT side
       Phone body: x=574–600, y=14–64
       Screen:     x=578–596, y=18–48  (mid y=33)
       Body right edge: x=600
       ══════════════════════════════════════════ -->
  <!-- phone body -->
  <rect x="520" y="14" width="26" height="50" rx="4" fill="#FFFFFF" stroke="#111111" stroke-width="1.5"/>
  <!-- screen -->
  <rect x="524" y="18" width="18" height="30" rx="2" fill="#1D9E75"/>
  <!-- screen label — line from right edge of screen (x=576) rightward -->
  <line x1="540" y1="30" x2="556" y2="30" stroke="#1D9E75" stroke-width="1"/>
  <text font-size="9" font-weight="700" fill="#1D9E75" x="558" y="32" text-anchor="start">area of distraction</text>
  <!-- bezel label — line from right edge of phone body (x=580) at y=52 -->
  <line x1="540" y1="52" x2="556" y2="52" stroke="#888884" stroke-width="1"/>
  <text font-size="9" fill="#73726C" x="558" y="52" text-anchor="start" dominant-baseline="central">bezel</text>

  <!--
    Phone spacing — equal 23px gaps between edges:
    Left edges:  20,  99, 191, 292, 407, 527
    Centers:     48, 133, 230, 338, 455, 573
    Bottom aligned at y=415.
  -->

  <!-- ── Ratio labels (14px above each phone top) ── -->
  <text font-size="13" font-weight="700" fill="#1D9E75" x="48"  y="267" text-anchor="middle">16.2%</text>
  <text font-size="13" font-weight="700" fill="#1D9E75" x="133" y="267" text-anchor="middle">46.5%</text>
  <text font-size="13" font-weight="700" fill="#1D9E75" x="230" y="247" text-anchor="middle">54.6%</text>
  <text font-size="13" font-weight="700" fill="#1D9E75" x="338" y="218" text-anchor="middle">68.9%</text>
  <text font-size="13" font-weight="700" fill="#1D9E75" x="455" y="193" text-anchor="middle">86.5%</text>
  <text font-size="13" font-weight="700" fill="#1D9E75" x="573" y="210" text-anchor="middle">86.4%</text>

  <!-- ===== NOKIA 2626 ===== -->
  <rect x="20"  y="280" width="56" height="135" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="31"  y="295" width="35" height="35"  rx="2" fill="#1D9E75"/>

  <!-- ===== SAMSUNG STAR ===== -->
  <rect x="99"  y="280" width="69" height="135" rx="6" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="108" y="295" width="51" height="85"  rx="2" fill="#1D9E75"/>

  <!-- ===== HTC DESIRE ===== -->
  <rect x="191" y="260" width="78" height="155" rx="7" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="199" y="285" width="63" height="105" rx="2" fill="#1D9E75"/>

  <!-- ===== MOTO G2 ===== -->
  <rect x="292" y="231" width="92" height="184" rx="8" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="298" y="251" width="81" height="144" rx="2" fill="#1D9E75"/>

  <!-- ===== ONEPLUS 7T ===== -->
  <rect x="407" y="206" width="97" height="209" rx="9" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="411" y="212" width="89" height="198" rx="5" fill="#1D9E75"/>
  <circle cx="455" cy="219" r="4" fill="#FFFFFF"/>

  <!-- ===== IPHONE 15 ===== -->
  <rect x="527" y="223" width="93" height="192" rx="9" fill="#FFFFFF" stroke="#111111" stroke-width="2"/>
  <rect x="532" y="228" width="84" height="182" rx="5" fill="#1D9E75"/>
  <rect x="557" y="232" width="34" height="8" rx="4" fill="#FFFFFF"/>

  <!-- ── Phone names and years ── -->
  <text font-size="10" font-weight="700" fill="#141413" x="48"  y="428" text-anchor="middle">Nokia 2626</text>
  <text font-size="10" font-weight="600" fill="#73726C" x="48"  y="442" text-anchor="middle">2006</text>

  <text font-size="10" font-weight="700" fill="#141413" x="133" y="428" text-anchor="middle">Samsung Star</text>
  <text font-size="10" font-weight="600" fill="#73726C" x="133" y="442" text-anchor="middle">2009</text>

  <text font-size="10" font-weight="700" fill="#141413" x="230" y="428" text-anchor="middle">HTC Desire</text>
  <text font-size="10" font-weight="600" fill="#73726C" x="230" y="442" text-anchor="middle">2012</text>

  <text font-size="10" font-weight="700" fill="#141413" x="338" y="428" text-anchor="middle">Moto G2</text>
  <text font-size="10" font-weight="600" fill="#73726C" x="338" y="442" text-anchor="middle">2015</text>

  <text font-size="10" font-weight="700" fill="#141413" x="455" y="428" text-anchor="middle">OnePlus 7T</text>
  <text font-size="10" font-weight="600" fill="#73726C" x="455" y="442" text-anchor="middle">2019</text>

  <text font-size="10" font-weight="700" fill="#141413" x="573" y="428" text-anchor="middle">iPhone 15</text>
  <text font-size="10" font-weight="700" fill="#1D9E75" x="573" y="442" text-anchor="middle">2024–now</text>

  <!-- ── Footnotes — right-aligned ── -->
  <text font-size="9" font-weight="600" fill="#333333" x="608" y="464" text-anchor="end">Data source: GSM Arena</text>
  <text font-size="9" font-weight="600" fill="#333333" x="608" y="478" text-anchor="end">30 Day Chart Challenge 2026 · Day 1 · Part-to-Whole · Surbhi Bhatia</text>

</svg>
